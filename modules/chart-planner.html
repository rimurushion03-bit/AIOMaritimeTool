<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#04101c">
<title>Chart Planner — NavHub</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600&family=JetBrains+Mono:wght@300;400;600&family=Noto+Sans:wght@300;400;600&display=swap');

:root {
  --bg:#04101c; --bg2:#061624; --bg3:#07192a;
  --panel:rgba(9,30,48,0.97); --ps:#091e30;
  --border:rgba(0,212,170,0.13); --border2:rgba(0,212,170,0.26);
  --accent:#00d4aa; --adim:rgba(0,212,170,0.10); --aglow:rgba(0,212,170,0.22);
  --orange:#ff8c42; --gold:#ffd700; --blue:#4a9eff; --purple:#a78bfa;
  --danger:#ef4444; --success:#10b981; --warn:#f59e0b;
  --text:#c8ddf0; --muted:#3d6080; --muted2:#5a7a96;
  --fhud:'Teko',sans-serif; --fmono:'JetBrains Mono',monospace; --fbody:'Noto Sans',sans-serif;
}
body.night {
  --bg:#000; --bg2:#07000a; --bg3:#0a0008;
  --panel:rgba(18,3,3,0.97); --ps:#120303;
  --border:rgba(255,34,34,0.16); --border2:rgba(255,34,34,0.3);
  --accent:#ff2222; --adim:rgba(255,34,34,0.10); --aglow:rgba(255,34,34,0.22);
  --text:#ffaaaa; --muted:#4a1a1a; --muted2:#7a3232;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--fbody);}
#app{display:flex;flex-direction:column;height:100dvh;position:relative;z-index:1;}

/* BG */
#bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:44px 44px;opacity:.4;}
@keyframes scan{0%{transform:translateY(-4px);}100%{transform:translateY(100vh);}}
#scan-line{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
#scan-line::after{content:'';position:absolute;width:100%;height:3px;
  background:linear-gradient(transparent,var(--aglow),transparent);animation:scan 14s linear infinite;}

/* HEADER */
#hdr{flex-shrink:0;background:var(--panel);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);padding:8px 12px;
  display:flex;align-items:center;gap:7px;z-index:500;position:relative;}
#hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.3;}
.hbk{height:30px;padding:0 9px;background:transparent;border:1px solid var(--orange);
  border-radius:7px;color:var(--orange);font-family:var(--fmono);font-size:10px;
  letter-spacing:1px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.hbk:hover{background:rgba(255,140,66,.12);}
.hlogo{font-family:var(--fhud);font-size:22px;font-weight:600;letter-spacing:4px;color:var(--accent);line-height:1;flex-shrink:0;}
.hlogo-s{font-family:var(--fmono);font-size:8px;letter-spacing:1px;color:var(--muted2);}
.hsp{flex:1;}
.hbtn{height:30px;padding:0 9px;background:transparent;border:1px solid var(--border2);
  border-radius:7px;color:var(--muted2);font-family:var(--fmono);font-size:9px;letter-spacing:1px;
  cursor:pointer;transition:all .15s;flex-shrink:0;display:flex;align-items:center;gap:4px;}
.hbtn:hover,.hbtn:active{background:var(--adim);border-color:var(--accent);color:var(--accent);}
.hbtn.on{background:var(--adim);border-color:var(--accent);color:var(--accent);}
.hbtn.chain-on{background:rgba(255,215,0,.12);border-color:var(--gold);color:var(--gold);}
.hbtn.chain-done{background:rgba(16,185,129,.15);border-color:#10b981;color:#10b981;display:none;}
.hbtn.chain-done.show{display:flex;}

/* FILTER TOGGLE TAB */
#fbt{display:flex;align-items:center;justify-content:center;height:14px;
  background:var(--bg2);border-bottom:1px solid var(--border);cursor:pointer;flex-shrink:0;user-select:none;}
.fbt-a{font-size:8px;color:var(--muted);transition:transform .3s;}
.fb-col .fbt-a{transform:rotate(180deg);}

/* FILTER BAR */
#fbWrap{flex-shrink:0;overflow:hidden;transition:max-height .3s;max-height:46px;}
#fbWrap.col{max-height:0;}
#filterBar{display:flex;gap:5px;padding:6px 12px;background:var(--bg2);
  border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
#filterBar::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:4px 10px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:var(--fmono);font-size:9px;
  cursor:pointer;transition:all .15s;white-space:nowrap;}
.fbtn.on{border-color:var(--accent);color:var(--accent);background:var(--adim);}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;}
#mapWrap{flex:1;min-height:0;display:flex;flex-direction:column;}
#map{flex:1;min-height:0;}
.leaflet-container{background:#04101c !important;}
.leaflet-tile{filter:brightness(.65) saturate(.5);}
body.night .leaflet-tile{filter:brightness(.35) saturate(.2) hue-rotate(330deg);}
.leaflet-control-zoom a{background:var(--ps) !important;color:var(--accent) !important;border-color:var(--border) !important;}
.leaflet-tooltip{background:var(--ps) !important;border:1px solid var(--accent) !important;color:var(--text) !important;
  font-family:var(--fmono) !important;font-size:10px !important;border-radius:6px !important;
  padding:5px 9px !important;box-shadow:none !important;}
.leaflet-tooltip::before{display:none !important;}

/* TEXT MODE */
#txm{display:none;flex:1;overflow-y:auto;padding:10px 12px;background:var(--bg);}
#txm.show{display:block;}
.ts{position:sticky;top:0;background:var(--bg);padding-bottom:8px;z-index:5;}
.ts input{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:var(--fmono);font-size:11px;padding:8px 12px;outline:none;transition:border-color .15s;}
.ts input::placeholder{color:var(--muted);}
.ts input:focus{border-color:var(--accent);}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.tcard{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:border-color .15s;animation:fi .2s ease;}
.tcard.inc{border-color:var(--gold);background:rgba(255,215,0,.05);}
.tno{font-family:var(--fhud);font-size:22px;color:var(--text);line-height:1;width:52px;flex-shrink:0;}
.tcard.inc .tno{color:var(--gold);}
.tinf{flex:1;min-width:0;}
.ttl{font-size:11px;color:var(--text);line-height:1.4;}
.tmt{font-family:var(--fmono);font-size:9px;color:var(--muted);margin-top:3px;}
.tsc{font-family:var(--fmono);font-size:10px;color:var(--blue);flex-shrink:0;text-align:right;}
.empty{text-align:center;padding:28px 20px;font-family:var(--fmono);font-size:11px;color:var(--muted);line-height:1.9;}

/* BOTTOM SHEET */
#sheet{flex-shrink:0;background:var(--panel);border-top:2px solid var(--border2);
  display:flex;flex-direction:column;transition:height .3s;height:44px;}
#sheet.exp{height:42vh;}
#shhd{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:44px;
  cursor:pointer;flex-shrink:0;border-bottom:1px solid var(--border);user-select:none;}
.sht{font-family:var(--fhud);font-size:18px;letter-spacing:3px;}
.shr{display:flex;align-items:center;gap:10px;}
.shc{font-family:var(--fmono);font-size:11px;color:var(--gold);}
.sha{color:var(--muted);font-size:13px;transition:transform .3s;}
#sheet:not(.exp) .sha{transform:rotate(180deg);}
#shtabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.stab{flex:1;padding:8px;text-align:center;font-family:var(--fmono);font-size:9px;
  letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.stab.on{color:var(--orange);border-bottom-color:var(--orange);}
#shbd{flex:1;overflow-y:auto;overscroll-behavior:contain;}

/* CHAIN LIST */
.ci{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);}
.cnum{font-family:var(--fhud);font-size:20px;color:var(--gold);width:22px;text-align:center;flex-shrink:0;}
.cinf{flex:1;min-width:0;}
.cid{font-family:var(--fmono);font-size:12px;color:var(--text);font-weight:600;}
.cly{font-size:9px;color:var(--muted);margin-left:4px;}
.ctl{font-size:11px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.csc{font-family:var(--fmono);font-size:9px;color:var(--blue);flex-shrink:0;}
.cacts{display:flex;gap:3px;flex-shrink:0;}
.cact{width:28px;height:28px;background:transparent;border:1px solid var(--border);border-radius:5px;
  color:var(--muted2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cact:hover{background:var(--adim);border-color:var(--accent);color:var(--accent);}

/* EXPORT */
#expw{padding:12px;}
#exportText{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:var(--fmono);font-size:10px;padding:10px;
  resize:none;height:110px;outline:none;line-height:1.6;}
#exportText:focus{border-color:var(--accent);}
.expbtns{display:flex;gap:6px;margin-top:8px;}
.expbtn{flex:1;padding:9px;border-radius:7px;border:none;font-family:var(--fhud);font-size:15px;letter-spacing:2px;cursor:pointer;}
.ep{background:var(--accent);color:var(--bg);}
.es{background:var(--border2);color:var(--text);}

/* SAVED CHAINS */
#savedTab{display:none;}
.sv-empty{text-align:center;padding:28px 20px;font-family:var(--fmono);font-size:11px;color:var(--muted);line-height:1.9;}
.sv-save-row{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sv-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:var(--fmono);font-size:11px;padding:7px 10px;outline:none;transition:border-color .15s;}
.sv-input::placeholder{color:var(--muted);}
.sv-input:focus{border-color:var(--accent);}
.sv-savebtn{padding:7px 14px;background:var(--accent);border:none;border-radius:7px;
  color:var(--bg);font-family:var(--fhud);font-size:14px;letter-spacing:1.5px;cursor:pointer;
  white-space:nowrap;transition:opacity .15s;}
.sv-savebtn:active{opacity:.7;}
.sv-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .15s;}
.sv-item:active{background:var(--adim);}
.sv-inf{flex:1;min-width:0;cursor:pointer;}
.sv-name{font-family:var(--fmono);font-size:12px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sv-meta{font-family:var(--fmono);font-size:9px;color:var(--muted2);margin-top:2px;}
.sv-load{padding:5px 10px;background:var(--adim);border:1px solid var(--accent);border-radius:6px;
  color:var(--accent);font-family:var(--fmono);font-size:9px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.sv-load:active{opacity:.7;}
.sv-del{width:28px;height:28px;background:transparent;border:1px solid var(--border2);border-radius:5px;
  color:var(--muted2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.sv-del:hover{border-color:var(--danger);color:var(--danger);}

/* WP PANEL */
#wpPanel{display:none;position:fixed;inset:0;z-index:3000;
  background:rgba(4,16,28,.97);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);flex-direction:column;}
#wpPanel.show{display:flex;}
.oph{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.opt{font-family:var(--fhud);font-size:20px;letter-spacing:2px;color:var(--accent);flex:1;}
.opc{padding:6px 12px;background:transparent;border:1px solid var(--border2);border-radius:6px;
  color:var(--muted2);font-family:var(--fmono);font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.opc:hover{background:var(--adim);border-color:var(--accent);color:var(--accent);}
.opb{flex:1;overflow-y:auto;padding:14px;}
.ops{font-family:var(--fmono);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}

/* GPX Banner */
.gpx-banner{background:rgba(0,212,170,.07);border:1px solid var(--border2);border-radius:9px;
  padding:11px 13px;margin-bottom:14px;display:none;}
.gpx-banner.show{display:block;}
.gpx-banner-head{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.gpx-banner-icon{font-size:14px;}
.gpx-banner-title{font-family:var(--fmono);font-size:9px;letter-spacing:1.5px;color:var(--accent);}
.gpx-banner-txt{font-family:var(--fmono);font-size:9px;color:var(--muted2);line-height:1.6;margin-bottom:9px;}
.gpx-actions{display:flex;gap:6px;flex-wrap:wrap;}
.gpx-btn{padding:5px 11px;border-radius:6px;border:1px solid var(--border2);
  background:transparent;color:var(--muted2);font-family:var(--fmono);font-size:9px;
  cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.gpx-btn:hover{background:var(--adim);border-color:var(--accent);color:var(--accent);}
.gpx-btn.primary{border-color:var(--accent);color:var(--accent);background:var(--adim);}
.gpx-btn.toggle-on{border-color:var(--accent);color:var(--accent);background:var(--adim);}
.gpx-btn.toggle-off{border-color:var(--muted);color:var(--muted);}

/* WP FORM */
.opf{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;}
.opr{display:flex;gap:8px;margin-bottom:8px;}
.opr:last-child{margin-bottom:0;}
.opi{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-family:var(--fmono);font-size:11px;padding:7px 10px;outline:none;min-width:0;transition:border-color .15s;}
.opi::placeholder{color:var(--muted);}
.opi:focus{border-color:var(--accent);}
.opar{display:flex;gap:6px;}
.opab{flex:1;padding:9px;background:var(--accent);border:none;border-radius:7px;
  color:var(--bg);font-family:var(--fhud);font-size:15px;letter-spacing:2px;cursor:pointer;}
.oppb{flex:1;padding:9px;background:transparent;border:1px solid var(--border2);border-radius:7px;
  color:var(--muted2);font-family:var(--fhud);font-size:15px;letter-spacing:2px;cursor:pointer;transition:all .15s;}
.oppb:hover{border-color:var(--accent);color:var(--accent);}
#wpa{display:none;margin-top:8px;}
#wpa textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:var(--fmono);font-size:10px;padding:10px;resize:none;height:88px;outline:none;line-height:1.6;}
#wpa textarea:focus{border-color:var(--accent);}
.opprs{width:100%;margin-top:6px;padding:9px;background:var(--orange);border:none;border-radius:7px;
  color:var(--bg);font-family:var(--fhud);font-size:15px;letter-spacing:2px;cursor:pointer;}
#wpErr{color:#ff6666;font-family:var(--fmono);font-size:10px;margin-top:6px;display:none;}
.wp-item{display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:var(--bg2);border:1px solid var(--border);border-radius:7px;margin-bottom:6px;}
.wp-num{font-family:var(--fhud);font-size:18px;color:var(--accent);width:20px;flex-shrink:0;}
.wp-inf{flex:1;min-width:0;}
.wp-nm{font-family:var(--fmono);font-size:11px;color:var(--text);font-weight:600;}
.wp-co{font-family:var(--fmono);font-size:9px;color:var(--muted2);margin-top:2px;}
.wp-del{width:26px;height:26px;background:transparent;border:1px solid var(--border2);
  border-radius:5px;color:var(--muted2);cursor:pointer;font-size:12px;transition:all .15s;}
.wp-del:hover{border-color:var(--danger);color:var(--danger);}
#wpDb{width:100%;padding:10px;background:var(--accent);border:none;border-radius:7px;
  color:var(--bg);font-family:var(--fhud);font-size:16px;letter-spacing:2px;cursor:pointer;margin-top:4px;display:none;}
#wpCb{width:100%;padding:10px;background:transparent;border:1px solid var(--border2);border-radius:7px;
  color:var(--muted2);font-family:var(--fhud);font-size:16px;letter-spacing:2px;cursor:pointer;margin-top:6px;display:none;transition:all .15s;}
#wpCb:hover{border-color:var(--danger);color:var(--danger);}

/* LOADING */
#ldo{display:none;position:fixed;inset:0;background:rgba(4,16,28,.93);
  z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#ldo.show{display:flex;}
.spin{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
#ldtxt{font-family:var(--fmono);font-size:11px;color:var(--accent);letter-spacing:2px;}

/* TOAST */
#toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:9998;pointer-events:none;}
.ti{background:var(--panel);border:1px solid var(--accent);padding:8px 16px;border-radius:20px;
  box-shadow:0 0 18px var(--aglow);backdrop-filter:blur(16px);
  font-family:var(--fmono);font-size:10px;color:var(--accent);letter-spacing:2px;
  opacity:0;transform:translateY(-6px);transition:all .3s cubic-bezier(.175,.885,.32,1.275);}
.ti.show{opacity:1;transform:translateY(0);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px;}
</style>
</head>
<body>
<div id="bg-grid"></div>
<div id="scan-line"></div>

<div id="app">

  <!-- HEADER -->
  <div id="hdr">
    <button class="hbk" onclick="try{window.parent.switchModule('home')}catch(e){history.back()}">⊞ HUB</button>
    <div>
      <div class="hlogo">CHART PLN</div>
      <div class="hlogo-s">VOYAGE CHART PLANNER</div>
    </div>
    <div class="hsp"></div>
    <button class="hbtn" id="modeBtn" onclick="toggleMode()">🗺 MAP</button>
    <button class="hbtn" id="wpBtn" onclick="toggleWpPanel()">📍 WP</button>
    <button class="hbtn" id="chainModeBtn" onclick="toggleChainMode()" title="Chain Mode">⛓</button>
    <button class="hbtn chain-done" id="chainDoneBtn" onclick="finishChain()" title="Selesai chain">✓ SELESAI</button>
    <button class="hbtn" onclick="document.getElementById('fileIn').click()" title="Load JSON manual">📂</button>
    <input type="file" id="fileIn" accept=".json" style="display:none" onchange="loadFile(event)">
  </div>

  <!-- FILTER TOGGLE -->
  <div id="fbt" onclick="toggleFB()"><span class="fbt-a" id="fbt-arrow">▲</span></div>

  <!-- FILTER BAR -->
  <div id="fbWrap">
    <div id="filterBar">
      <button class="fbtn on" data-layer="ALL" onclick="setFilter('ALL',this)">ALL</button>
      <button class="fbtn" data-layer="GENERAL" onclick="setFilter('GENERAL',this)">🌐 GENERAL</button>
      <button class="fbtn" data-layer="OVERVIEW" onclick="setFilter('OVERVIEW',this)">🗺 OVERVIEW</button>
      <button class="fbtn" data-layer="COASTAL" onclick="setFilter('COASTAL',this)">🏖 COASTAL</button>
      <button class="fbtn" data-layer="APPROACH" onclick="setFilter('APPROACH',this)">🧭 APPROACH</button>
      <button class="fbtn" data-layer="HARBOUR" onclick="setFilter('HARBOUR',this)">🏗 HARBOUR</button>
      <button class="fbtn" data-layer="BERTHING" onclick="setFilter('BERTHING',this)">⚓ BERTHING</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="mapWrap"><div id="map"></div></div>
    <div id="txm">
      <div class="ts">
        <input type="search" id="txSearch" placeholder="🔍  Cari nomor atau nama peta..." oninput="renderText()">
      </div>
      <div id="txList"></div>
    </div>
  </div>

  <!-- BOTTOM SHEET -->
  <div id="sheet">
    <div id="shhd" onclick="toggleSheet()">
      <span class="sht">ROUTE CHAIN</span>
      <div class="shr">
        <span class="shc" id="chainCnt">0 peta</span>
        <span class="sha">▲</span>
      </div>
    </div>
    <div id="shtabs">
      <div class="stab on" onclick="showTab('chain',this)">CHAIN</div>

        <div id="chainList"></div>
      </div>
      <div id="expTab" style="display:none">
        <div id="expw">
          <textarea id="exportText" readonly placeholder="Chain akan tampil di sini..."></textarea>
          <div class="expbtns">
            <button class="expbtn ep" onclick="copyExport()">COPY TEKS</button>
            <button class="expbtn es" onclick="clearChain()">CLEAR</button>
          </div>
        </div>
      </div>
      <div id="savedTab" style="display:none">
        <div class="sv-save-row">
          <input class="sv-input" id="svNameInput" placeholder="Nama preset (mis: VOYAGE KTI-MKS)" maxlength="40">
          <button class="sv-savebtn" onclick="saveChain()">SAVE</button>

        <div id="savedList"></div>

</div>

<!-- WP PANEL -->
<div id="wpPanel">
  <div class="oph">
    <span class="opt">📍 WAYPOINTS</span>
    <button class="opc" onclick="toggleWpPanel()">✕ TUTUP</button>
  </div>
  <div class="opb">

    <!-- GPX Banner -->
    <div class="gpx-banner" id="gpxBanner">
      <div class="gpx-banner-head">
        <span class="gpx-banner-icon">📡</span>
        <span class="gpx-banner-title">GPX DATA TERSEDIA</span>
      </div>
      <div class="gpx-banner-txt" id="gpxBannerTxt">Ditemukan route GPX di NavHub storage.</div>
      <div class="gpx-actions">
        <button class="gpx-btn primary" onclick="loadGPXFromStorage()">⬇ LOAD GPX</button>
        <button class="gpx-btn" id="routeToggleBtn" onclick="toggleRouteVisibility()">👁 SHOW ROUTE</button>
      </div>
    </div>

    <div class="ops">Tambah Waypoint Manual</div>
    <div class="opf">
      <div class="opr"><input class="opi" id="wpNm" placeholder="Nama (mis: SANGATTA)"></div>
      <div class="opr">
        <input class="opi" id="wpLt" placeholder="00° 58.800' N">
        <input class="opi" id="wpLn" placeholder="117° 34.800' E">
      </div>
      <div class="opar">
        <button class="opab" onclick="addWpManual()">+ TAMBAH</button>
        <button class="oppb" onclick="togPaste()">PASTE</button>
      </div>
      <div id="wpa">
        <textarea id="wpaText" placeholder="SANGATTA    00° 58.800' N    117° 34.800' E&#10;SAMARINDA   00° 30.000' S    117° 09.000' E"></textarea>
        <button class="opprs" onclick="parsePaste()">PARSE & TAMBAH</button>
        <div id="wpErr"></div>
      </div>
    </div>

    <div class="ops" id="wpLtl" style="display:none">Daftar Waypoint</div>
    <div id="wpList"></div>
    <button id="wpDb" onclick="drawRoute();toggleWpPanel()">🗺 TAMPILKAN DI MAP</button>
    <!-- Save & Download actions -->
    <div id="wpSaveBtn" style="display:none;gap:6px;margin-top:6px;">
      <button onclick="saveGPXtoNavHub()" style="flex:1;padding:10px;background:var(--adim);border:1px solid var(--accent);border-radius:7px;color:var(--accent);font-family:var(--fhud);font-size:14px;letter-spacing:1.5px;cursor:pointer;">💾 SAVE TO NAVHUB</button>
      <button onclick="downloadGPX()" style="flex:1;padding:10px;background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--muted2);font-family:var(--fhud);font-size:14px;letter-spacing:1.5px;cursor:pointer;">⬇ DOWNLOAD GPX</button>
    </div>
    <button id="wpCb" onclick="clearWaypoints()">HAPUS SEMUA</button>
  </div>
</div>

<div id="ldo"><div class="spin"></div><div id="ldtxt">Memuat...</div></div>
<div id="toast"><div class="ti" id="ti"></div></div>

<script src="../navhub-db.js"></script>
<script>
/* ─── LAYER COLORS ─── */
const LC={GENERAL:{s:'#4a9eff'},OVERVIEW:{s:'#00d4aa'},COASTAL:{s:'#ff8c42'},APPROACH:{s:'#a78bfa'},HARBOUR:{s:'#ffd700'},BERTHING:{s:'#ff6b6b'}};

/* ─── STATE ─── */
let charts=[],chain=[],waypoints=[];
let activeFilters=new Set(['ALL']);
let mapMode=true,sheetCol=true,activeTab='chain';
let chainMode=false,chainFinished=false,intersectVisible=null;
let routeLayer=null,wpMarkers=[];
let routeVisible=false;
let fbToggleState=false,toastT;

/* ─── MAP ─── */
const map=L.map('map',{center:[-2,118],zoom:5,zoomControl:false,attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,opacity:.55}).addTo(map);
L.control.zoom({position:'topright'}).addTo(map);
const fitCtrl=L.control({position:'topright'});
fitCtrl.onAdd=function(){
  const b=L.DomUtil.create('button','');b.innerHTML='⊡';b.title='Fit peta';
  b.style.cssText='width:30px;height:30px;background:var(--ps);color:var(--accent);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;margin-top:4px;';
  L.DomEvent.on(b,'click',L.DomEvent.stopPropagation);L.DomEvent.on(b,'click',fitVisible);return b;
};
fitCtrl.addTo(map);

window.addEventListener('message',e=>{
  if(e.data&&(e.data.type==='night'||e.data.type==='navhub-night'))
    document.body.classList.toggle('night',e.data.value??e.data.night);
});

/* ─── TOAST ─── */
function toast(m){const i=document.getElementById('ti');i.textContent=m;i.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>i.classList.remove('show'),2500);}

/* ─── FILTER BAR TOGGLE ─── */
function toggleFB(){fbToggleState=!fbToggleState;document.getElementById('fbWrap').classList.toggle('col',fbToggleState);document.getElementById('fbt-arrow').style.transform=fbToggleState?'rotate(180deg)':'rotate(0)';setTimeout(()=>map.invalidateSize(),310);}

/* ─── LOAD FILE MANUAL ─── */
function loadFile(e){const f=e.target.files[0];if(!f)return;showLd('Membaca file...');const r=new FileReader();r.onload=ev=>{try{parseData(JSON.parse(ev.target.result));}catch(err){hideLd();toast('GAGAL: '+err.message);}};r.readAsText(f);e.target.value='';}

/* ─── AUTO-LOAD CHART DATA FROM INDEXEDDB ─── */
async function autoLoadChartData(){
  const rec=await NavHubDB.getChartData();
  if(!rec){setTimeout(()=>toast('TIP: UPLOAD JSON DI NAVHUB → SIDEBAR'),1000);return false;}
  showLd('Auto-loading chart data...');
  try{parseData(JSON.parse(rec.raw));return true;}
  catch(e){hideLd();toast('DB DATA ERROR');return false;}
}

/* ─── PARSE DATA ─── */
function parseData(json){
  showLd('Memproses geometri...');const layers=json.layers||json;charts=[];
  for(const[ln,recs]of Object.entries(layers)){
    for(const rec of recs){
      const a=rec.attributes||rec,g=rec.geometry;if(!g?.paths?.[0])continue;
      const pts=g.paths[0],lons=pts.map(p=>p[0]),lats=pts.map(p=>p[1]);
      charts.push({uid:ln+'_'+a.OBJECTID,layer:ln.toUpperCase(),attr:a,
        bbox:{minLon:Math.min(...lons),maxLon:Math.max(...lons),minLat:Math.min(...lats),maxLat:Math.max(...lats)},rect:null});
    }
  }
  setTimeout(()=>{renderMap();renderText();hideLd();if(charts.length)fitVisible();},30);
}

/* ─── MAP RENDER ─── */
function isVis(c){
  if(chainFinished) return chain.includes(c.uid);
  const ok=activeFilters.has('ALL')||activeFilters.has(c.layer);if(!ok)return false;
  if(intersectVisible!==null)return intersectVisible.has(c.uid);
  return true;
}
function renderMap(){
  charts.forEach(c=>{if(c.rect){map.removeLayer(c.rect);c.rect=null;}});
  const sorted=charts.filter(isVis).sort((a,b)=>Number(b.attr.SCALE||0)-Number(a.attr.SCALE||0));
  sorted.forEach(c=>{
    const ic=chain.includes(c.uid),col=LC[c.layer]||{s:'#fff'};
    const r=L.rectangle([[c.bbox.minLat,c.bbox.minLon],[c.bbox.maxLat,c.bbox.maxLon]],
      ic?{color:'#ffd700',weight:2.5,dashArray:null,fillColor:'#ffd700',fillOpacity:.18}:{color:col.s,weight:1.5,dashArray:'5,4',fillColor:col.s,fillOpacity:.08});
    r.bindTooltip(`<b>${c.attr.CHART_ID}</b> · ${c.layer}<br>${(c.attr.TITLE||'').substring(0,36)}<br><span style="color:#4a9eff">1:${Number(c.attr.SCALE||0).toLocaleString('id')}</span>`,{sticky:true});
    r.on('click',()=>toggleChain(c.uid));r.addTo(map);c.rect=r;
  });
  if(window._cl)window._cl.forEach(l=>map.removeLayer(l));window._cl=[];
  chain.forEach(uid=>{
    const c=charts.find(ch=>ch.uid===uid);if(!c?.rect)return;c.rect.bringToFront();
    const lt=(c.bbox.minLat+c.bbox.maxLat)/2,ln=(c.bbox.minLon+c.bbox.maxLon)/2;
    const lb=L.marker([lt,ln],{icon:L.divIcon({className:'',html:`<div style="background:rgba(4,16,28,.8);border:1px solid #ffd700;color:#ffd700;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px;white-space:nowrap;pointer-events:none;transform:translate(-50%,-50%)">${c.attr.CHART_ID}</div>`,iconSize:[0,0],iconAnchor:[0,0]}),interactive:false,zIndexOffset:1000});
    lb.addTo(map);window._cl.push(lb);
  });
}
function fitVisible(){
  const t=chain.length>0?charts.filter(c=>chain.includes(c.uid)):(activeFilters.has('ALL')?charts:charts.filter(c=>activeFilters.has(c.layer)));
  if(!t.length)return;let a=90,b=-90,c=180,d=-180;
  t.forEach(x=>{a=Math.min(a,x.bbox.minLat);b=Math.max(b,x.bbox.maxLat);c=Math.min(c,x.bbox.minLon);d=Math.max(d,x.bbox.maxLon);});
  map.fitBounds([[a,c],[b,d]],{padding:[20,20]});
}

/* ─── TEXT LIST ─── */
function renderText(){
  const q=(document.getElementById('txSearch').value||'').toLowerCase();
  const vis=activeFilters.has('ALL')?charts:charts.filter(c=>activeFilters.has(c.layer));
  const fil=q?vis.filter(c=>(c.attr.CHART_ID||'').toLowerCase().includes(q)||(c.attr.TITLE||'').toLowerCase().includes(q)):vis;
  const el=document.getElementById('txList');
  if(!fil.length){el.innerHTML='<div class="empty">Tidak ada peta ditemukan.</div>';return;}
  el.innerHTML=fil.map(c=>{const ic=chain.includes(c.uid),col=LC[c.layer]?.s||'#fff';
    return`<div class="tcard ${ic?'inc':''}" onclick="toggleChain('${c.uid}')"><div class="tno">${c.attr.CHART_ID||'—'}</div><div class="tinf"><div class="ttl">${c.attr.TITLE||''}</div><div class="tmt">${c.layer} · ${c.attr.EDITION||''}</div></div><div class="tsc" style="color:${col}">1:${Number(c.attr.SCALE||0).toLocaleString('id')}<br><span style="color:var(--muted);font-size:8px">${ic?'✓ IN CHAIN':''}</span></div></div>`;
  }).join('');
}

/* ─── CHAIN ─── */
function bboxX(a,b){return!(a.maxLon<b.minLon||a.minLon>b.maxLon||a.maxLat<b.minLat||a.minLat>b.maxLat);}
function toggleChain(uid){if(!chainMode)return;chainAdd(uid);}
function chainAdd(uid){
  const i=chain.indexOf(uid);if(i!==-1){const rm=chain.splice(i);rm.forEach(u=>updateRect(u));rebuildIntersect();renderMap();renderChainList();renderText();return;}
  chain.push(uid);updateRect(uid);const c=charts.find(ch=>ch.uid===uid);
  if(c){const nv=new Set();charts.forEach(o=>{if(bboxX(c.bbox,o.bbox))nv.add(o.uid);});chain.forEach(u=>nv.add(u));intersectVisible=nv;}
  renderMap();renderChainList();renderText();if(sheetCol)toggleSheet();
}
function rebuildIntersect(){if(chain.length===0){intersectVisible=null;return;}const c=charts.find(ch=>ch.uid===chain[chain.length-1]);if(!c){intersectVisible=null;return;}const nv=new Set();charts.forEach(o=>{if(bboxX(c.bbox,o.bbox))nv.add(o.uid);});chain.forEach(u=>nv.add(u));intersectVisible=nv;}
function updateRect(uid){const c=charts.find(ch=>ch.uid===uid);if(!c?.rect)return;const ic=chain.includes(uid),col=LC[c.layer]||{s:'#fff'};if(ic)c.rect.setStyle({color:'#ffd700',weight:2.5,dashArray:null,fillColor:'#ffd700',fillOpacity:.18});else c.rect.setStyle({color:col.s,weight:1.5,dashArray:'5,4',fillColor:col.s,fillOpacity:.08});}
function toggleChainMode(){
  chainMode=!chainMode;
  chainFinished=false;
  const btn=document.getElementById('chainModeBtn');
  const doneBtn=document.getElementById('chainDoneBtn');
  btn.classList.toggle('chain-on',chainMode);
  doneBtn.classList.toggle('show',chainMode);
  if(chainMode&&chain.length>0)rebuildIntersect();
  else{intersectVisible=null;}
  renderMap();
  toast(chainMode?'CHAIN MODE ON':'CHAIN MODE OFF');
}
function finishChain(){
  if(!chain.length){toast('CHAIN KOSONG');return;}
  chainFinished=true;
  chainMode=false;
  intersectVisible=null;
  document.getElementById('chainModeBtn').classList.remove('chain-on');
  document.getElementById('chainDoneBtn').classList.remove('show');
  renderMap();
  toast('✓ CHAIN SELESAI · '+chain.length+' PETA');
}
function moveChain(uid,d){const i=chain.indexOf(uid);if(i<0)return;const ni=i+d;if(ni<0||ni>=chain.length)return;[chain[i],chain[ni]]=[chain[ni],chain[i]];renderChainList();}
function removeFromChain(uid){chain=chain.filter(u=>u!==uid);const c=charts.find(ch=>ch.uid===uid);if(c?.rect){const col=LC[c.layer]||{s:'#fff'};c.rect.setStyle({color:col.s,weight:1.5,dashArray:'5,4',fillColor:col.s,fillOpacity:.08});}renderChainList();renderText();}
function clearChain(){chain.forEach(uid=>{const c=charts.find(ch=>ch.uid===uid);if(c?.rect){const col=LC[c.layer]||{s:'#fff'};c.rect.setStyle({color:col.s,weight:1.5,dashArray:'5,4',fillColor:col.s,fillOpacity:.08});}});chain=[];intersectVisible=null;chainFinished=false;document.getElementById('chainDoneBtn').classList.remove('show');if(window._cl){window._cl.forEach(l=>map.removeLayer(l));window._cl=[];}renderChainList();renderText();renderMap();document.getElementById('exportText').value='';}
function renderChainList(){
  const list=document.getElementById('chainList'),empty=document.getElementById('chainEmpty');
  document.getElementById('chainCnt').textContent=chain.length+' peta';
  if(chain.length===0){empty.style.display='block';list.innerHTML='';if(activeTab==='exp')document.getElementById('exportText').value='';return;}
  empty.style.display='none';
  list.innerHTML=chain.map((uid,i)=>{const c=charts.find(ch=>ch.uid===uid);if(!c)return'';const a=c.attr;
    return`<div class="ci"><div class="cnum">${i+1}</div><div class="cinf"><div class="cid">${a.CHART_ID}<span class="cly">${c.layer}</span></div><div class="ctl">${a.TITLE||''}</div></div><div class="csc">1:${Number(a.SCALE||0).toLocaleString('id')}</div><div class="cacts"><button class="cact" onclick="moveChain('${uid}',-1)">↑</button><button class="cact" onclick="moveChain('${uid}',1)">↓</button><button class="cact" onclick="removeFromChain('${uid}')">✕</button></div></div>`;
  }).join('');
  if(activeTab==='exp')updateExport();
}

/* ─── EXPORT ─── */
function updateExport(){
  if(!chain.length){document.getElementById('exportText').value='';return;}
  const lines=['VOYAGE CHART CHAIN','Generated: '+new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),'━'.repeat(38),''];
  chain.forEach((uid,i)=>{const c=charts.find(ch=>ch.uid===uid);if(!c)return;const a=c.attr;lines.push(`${String(i+1).padStart(2,'0')}. [${a.CHART_ID}] ${a.TITLE||''}`);lines.push(`    Scale  : 1:${Number(a.SCALE||0).toLocaleString('id')} | ${c.layer}`);lines.push(`    Edition: ${a.EDITION||'-'}`);lines.push(`    NM s/d : ${a.NM_PRINTED||'-'}`);if(i<chain.length-1)lines.push('    ↓');});
  lines.push('','━'.repeat(38),`Total: ${chain.length} peta`);document.getElementById('exportText').value=lines.join('\n');
}
function copyExport(){updateExport();const txt=document.getElementById('exportText').value;if(!txt)return;navigator.clipboard.writeText(txt).then(()=>toast('TERSALIN!')).catch(()=>{document.getElementById('exportText').select();document.execCommand('copy');toast('TERSALIN!');});}

/* ─── UI CONTROLS ─── */
function toggleMode(){mapMode=!mapMode;const b=document.getElementById('modeBtn');document.getElementById('mapWrap').style.display=mapMode?'flex':'none';document.getElementById('txm').classList.toggle('show',!mapMode);b.textContent=mapMode?'🗺 MAP':'📋 TEXT';b.classList.toggle('on',!mapMode);if(mapMode)setTimeout(()=>map.invalidateSize(),50);else renderText();}
function setFilter(layer,btn){if(layer==='ALL'){activeFilters=new Set(['ALL']);document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}else{activeFilters.delete('ALL');document.querySelector('.fbtn[data-layer="ALL"]').classList.remove('on');if(activeFilters.has(layer)){activeFilters.delete(layer);btn.classList.remove('on');if(activeFilters.size===0){activeFilters.add('ALL');document.querySelector('.fbtn[data-layer="ALL"]').classList.add('on');}}else{activeFilters.add(layer);btn.classList.add('on');}}renderMap();renderText();}
function toggleSheet(){sheetCol=!sheetCol;document.getElementById('sheet').classList.toggle('exp',!sheetCol);setTimeout(()=>map.invalidateSize(),310);}
function showTab(t,el){activeTab=t;document.querySelectorAll('.stab').forEach(x=>x.classList.remove('on'));el.classList.add('on');document.getElementById('chainTab').style.display=t==='chain'?'block':'none';document.getElementById('expTab').style.display=t==='exp'?'block':'none';document.getElementById('savedTab').style.display=t==='saved'?'block':'none';if(t==='exp')updateExport();if(t==='saved')renderSavedTab();}
function showLd(m){document.getElementById('ldo').classList.add('show');document.getElementById('ldtxt').textContent=m||'Memuat...';}
function hideLd(){document.getElementById('ldo').classList.remove('show');}

/* ─── WAYPOINTS ─── */
function parseDDM(s){s=s.trim().toUpperCase();const m=s.match(/(\d+)\s*[°d]\s*(\d+\.?\d*)\s*['''`]?\s*([NSEW])/);if(!m)return null;const dd=parseInt(m[1])+parseFloat(m[2])/60;return(m[3]==='S'||m[3]==='W')?-dd:dd;}
function ddToDDM(dd,dirs){const dir=dd>=0?dirs[0]:dirs[1],abs=Math.abs(dd),d=Math.floor(abs),mn=((abs-d)*60).toFixed(3);return(d<10?'0':'')+d+'° '+mn+"' "+dir;}
function addWpManual(){const nm=document.getElementById('wpNm').value.trim()||('WP'+(waypoints.length+1));const lat=parseDDM(document.getElementById('wpLt').value);const lon=parseDDM(document.getElementById('wpLn').value);if(lat===null||lon===null){alert("Format tidak valid.\nContoh: 00° 58.800' N");return;}waypoints.push({name:nm,lat,lon});document.getElementById('wpNm').value='';document.getElementById('wpLt').value='';document.getElementById('wpLn').value='';renderWpList();}
function togPaste(){const a=document.getElementById('wpa');a.style.display=a.style.display==='none'?'block':'none';}
function parsePaste(){const txt=document.getElementById('wpaText').value,errEl=document.getElementById('wpErr');const rows=txt.split('\n').map(l=>l.trim()).filter(l=>l);const errs=[];rows.forEach((line,idx)=>{const parts=line.split(/  +|\t/).map(t=>t.trim()).filter(t=>t);let nm,ls,los;if(parts.length>=3){nm=parts[0];ls=parts[1];los=parts[2];}else if(parts.length===2){nm='WP'+(waypoints.length+1);ls=parts[0];los=parts[1];}else{errs.push('Baris '+(idx+1)+': tidak dikenali');return;}const lat=parseDDM(ls),lon=parseDDM(los);if(lat===null||lon===null){errs.push('Baris '+(idx+1)+': koordinat tidak valid');return;}waypoints.push({name:nm,lat,lon});});if(errs.length){errEl.style.display='block';errEl.textContent=errs.join(' | ');}else{errEl.style.display='none';document.getElementById('wpaText').value='';document.getElementById('wpa').style.display='none';}renderWpList();}
function renderWpList(){
  const list=document.getElementById('wpList'),title=document.getElementById('wpLtl'),db=document.getElementById('wpDb'),cb=document.getElementById('wpCb'),sb=document.getElementById('wpSaveBtn');
  if(!waypoints.length){list.innerHTML='';title.style.display='none';db.style.display='none';cb.style.display='none';if(sb)sb.style.display='none';return;}
  title.style.display='block';db.style.display='block';cb.style.display='block';if(sb)sb.style.display='flex';
  list.innerHTML=waypoints.map((wp,i)=>`<div class="wp-item"><div class="wp-num">${i+1}</div><div class="wp-inf"><div class="wp-nm">${wp.name}</div><div class="wp-co">${ddToDDM(wp.lat,'NS')}&nbsp;&nbsp;${ddToDDM(wp.lon,'EW')}</div></div><button class="wp-del" onclick="removeWp(${i})">✕</button></div>`).join('');
}
function removeWp(i){waypoints.splice(i,1);renderWpList();}
function drawRoute(){
  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}wpMarkers.forEach(m=>map.removeLayer(m));wpMarkers=[];if(!waypoints.length)return;
  routeLayer=L.polyline(waypoints.map(wp=>[wp.lat,wp.lon]),{color:'#00d4aa',weight:2.5,dashArray:'8,4',opacity:.9}).addTo(map);
  waypoints.forEach((wp,i)=>{const mk=L.marker([wp.lat,wp.lon],{icon:L.divIcon({className:'',html:`<div style="pointer-events:none;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center"><div style="background:rgba(4,16,28,.88);border:1px solid #00d4aa;color:#00d4aa;font-family:monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;white-space:nowrap;margin-bottom:2px">${i+1}. ${wp.name}</div><div style="width:6px;height:6px;background:#00d4aa;border-radius:50%"></div></div>`,iconSize:[0,0],iconAnchor:[0,0]}),interactive:false});mk.addTo(map);wpMarkers.push(mk);});
  map.fitBounds(routeLayer.getBounds(),{padding:[30,30]});routeVisible=true;syncRouteBtn();
}
function clearWaypoints(){waypoints=[];if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}wpMarkers.forEach(m=>map.removeLayer(m));wpMarkers=[];routeVisible=false;syncRouteBtn();renderWpList();}
function toggleWpPanel(){document.getElementById('wpPanel').classList.toggle('show');checkGPXBanner();}

/* ─── SHOW / HIDE ROUTE ─── */
function toggleRouteVisibility(){if(!routeLayer&&!wpMarkers.length){toast('BELUM ADA ROUTE');return;}routeVisible=!routeVisible;if(routeLayer){if(routeVisible)routeLayer.addTo(map);else map.removeLayer(routeLayer);}wpMarkers.forEach(m=>{if(routeVisible)m.addTo(map);else map.removeLayer(m);});syncRouteBtn();toast(routeVisible?'ROUTE: VISIBLE':'ROUTE: HIDDEN');}
function syncRouteBtn(){const btn=document.getElementById('routeToggleBtn');if(!btn)return;const has=!!(routeLayer||wpMarkers.length);if(!has){btn.textContent='👁 SHOW ROUTE';btn.className='gpx-btn toggle-off';return;}btn.textContent=routeVisible?'🚫 HIDE ROUTE':'👁 SHOW ROUTE';btn.className=routeVisible?'gpx-btn toggle-on':'gpx-btn toggle-off';}

/* ─── SAVE GPX → NAVHUB INDEXEDDB ─── */
async function saveGPXtoNavHub(){
  if(!waypoints.length){toast('TIDAK ADA WAYPOINT');return;}
  const fileName=`route_${new Date().toISOString().split('T')[0]}.gpx`;
  await NavHubDB.saveGPX('main',{
    fileName,
    waypoints  :waypoints.map(wp=>({name:wp.name,lat:wp.lat,lon:wp.lon})),
    trackPoints:waypoints.map(wp=>({lat:wp.lat,lon:wp.lon})),
    rawGPX     :NavHubDB.generateGPXString(waypoints,'NavHub Route'),
  });
  NavHubDB.notifyParent('nh-gpx-saved');
  toast('✓ ROUTE DISIMPAN KE NAVHUB');
}

/* ─── DOWNLOAD GPX (via parent) ─── */
function downloadGPX(){
  if(!waypoints.length){toast('TIDAK ADA WAYPOINT');return;}
  const fileName=`route_${new Date().toISOString().split('T')[0]}.gpx`;
  const content=NavHubDB.generateGPXString(waypoints,'NavHub Route');
  NavHubDB.notifyParent('nh-download-gpx',{fileName,content});
  toast('⬇ MENGIRIM KE NAVHUB...');
}

/* ─── LOAD GPX FROM INDEXEDDB ─── */
async function checkGPXBanner(){
  const rec=await NavHubDB.getGPX('main');
  const banner=document.getElementById('gpxBanner');
  if(rec){document.getElementById('gpxBannerTxt').textContent=`${rec.fileName}  ·  ${rec.waypointCount} wpt  ·  ${rec.trackPointCount} trk pts`;banner.classList.add('show');}
  else{banner.classList.remove('show');}
  syncRouteBtn();
}
async function loadGPXFromStorage(){
  const rec=await NavHubDB.getGPX('main');if(!rec){toast('TIDAK ADA DATA GPX');return;}
  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}wpMarkers.forEach(m=>map.removeLayer(m));wpMarkers=[];waypoints=[];
  if(rec.waypoints&&rec.waypoints.length)rec.waypoints.forEach(w=>waypoints.push({name:w.name||('WP'+(waypoints.length+1)),lat:w.lat,lon:w.lon}));
  if(!waypoints.length&&rec.trackPoints&&rec.trackPoints.length)rec.trackPoints.forEach((p,i)=>waypoints.push({name:'T'+(i+1),lat:p.lat,lon:p.lon}));
  renderWpList();
  const pts=(rec.trackPoints&&rec.trackPoints.length)?rec.trackPoints:waypoints;
  if(pts.length)routeLayer=L.polyline(pts.map(p=>[p.lat,p.lon]),{color:'#00d4aa',weight:2.5,dashArray:'8,4',opacity:.9}).addTo(map);
  waypoints.forEach((wp,i)=>{const mk=L.marker([wp.lat,wp.lon],{icon:L.divIcon({className:'',html:`<div style="pointer-events:none;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center"><div style="background:rgba(4,16,28,.88);border:1px solid #00d4aa;color:#00d4aa;font-family:monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;white-space:nowrap;margin-bottom:2px">${i+1}. ${wp.name}</div><div style="width:6px;height:6px;background:#00d4aa;border-radius:50%"></div></div>`,iconSize:[0,0],iconAnchor:[0,0]}),interactive:false});mk.addTo(map);wpMarkers.push(mk);});
  routeVisible=true;syncRouteBtn();if(routeLayer)map.fitBounds(routeLayer.getBounds(),{padding:[30,30]});
  toast(`GPX LOADED · ${waypoints.length} WPT`);document.getElementById('wpPanel').classList.remove('show');
}

/* ─── SAVED CHAINS ─── */
async function saveChain(){
  if(!chain.length){toast('CHAIN KOSONG');return;}
  const nameEl=document.getElementById('svNameInput');
  const name=nameEl.value.trim()||('Chain '+new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}));
  const id='chain_'+Date.now();
  await NavHubDB.saveRoute({
    id, name,
    chain:[...chain],
    chartCount:chain.length,
    date:new Date().toISOString(),
  });
  nameEl.value='';
  toast('✓ CHAIN "'+name+'" DISIMPAN');
  renderSavedTab();
}

async function renderSavedTab(){
  const list=document.getElementById('savedList');
  const rows=await NavHubDB.getAllRoutes();
  if(!rows.length){
    list.innerHTML='<div class="sv-empty">Belum ada chain tersimpan.<br>Susun chain lalu tap SAVE.</div>';
    return;
  }
  rows.sort((a,b)=>b.date.localeCompare(a.date));
  list.innerHTML=rows.map(r=>{
    const d=new Date(r.date);
    const ds=d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    return`<div class="sv-item">
      <div class="sv-inf" onclick="loadChain('${r.id}')">
        <div class="sv-name">${r.name}</div>
        <div class="sv-meta">${r.chartCount} peta &nbsp;·&nbsp; ${ds}</div>
      </div>
      <button class="sv-load" onclick="loadChain('${r.id}')">⬆ LOAD</button>
      <button class="sv-del" onclick="deleteChain('${r.id}')">✕</button>
    </div>`;
  }).join('');
}

async function loadChain(id){
  const rec=await NavHubDB.getRoute(id);
  if(!rec){toast('DATA TIDAK DITEMUKAN');return;}
  // Clear chain dulu
  chain.forEach(uid=>{const c=charts.find(ch=>ch.uid===uid);if(c?.rect){const col=LC[c.layer]||{s:'#fff'};c.rect.setStyle({color:col.s,weight:1.5,dashArray:'5,4',fillColor:col.s,fillOpacity:.08});}});
  chain=[];intersectVisible=null;
  if(window._cl){window._cl.forEach(l=>map.removeLayer(l));window._cl=[];}
  // Load chain dari preset — hanya uid yang masih ada di charts
  rec.chain.forEach(uid=>{if(charts.find(ch=>ch.uid===uid))chain.push(uid);});
  renderMap();renderChainList();renderText();
  // Pindah ke tab chain dan expand sheet
  const chainTabEl=document.querySelector('.stab');
  showTab('chain',chainTabEl);
  if(sheetCol)toggleSheet();
  if(chain.length){fitVisible();}
  toast('✓ LOADED: '+rec.name+' ('+chain.length+' peta)');
}

async function deleteChain(id){
  await NavHubDB.deleteRoute(id);
  toast('CHAIN DIHAPUS');
  renderSavedTab();
}

/* ─── INIT ─── */
document.addEventListener('DOMContentLoaded',()=>{autoLoadChartData();syncRouteBtn();});
</script>
