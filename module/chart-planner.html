<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Voyage Chart Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=JetBrains+Mono:wght@400;600&family=Noto+Sans:wght@300;400;600&display=swap');

:root {
  --bg: #06111e;
  --bg2: #091929;
  --panel: #0b1f33;
  --border: #153050;
  --accent: #00d4aa;
  --accent2: #ff8c42;
  --accent3: #4a9eff;
  --text: #c8dff0;
  --muted: #4a6a8a;
  --chain: #ffd700;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Noto Sans',sans-serif; }
#app { display:flex; flex-direction:column; height:100dvh; }

/* HEADER */
#header {
  flex-shrink:0; background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:10px 14px; display:flex; align-items:center; gap:8px; z-index:1000;
}
.logo { font-family:'Teko',sans-serif; font-size:22px; font-weight:600; letter-spacing:3px; color:var(--accent); line-height:1; flex-shrink:0; }
.logo span { color:var(--text); opacity:0.4; }
.sub { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; display:none; }
@media(min-width:400px){ .sub { display:block; } }

.hbtn {
  padding:6px 10px; background:transparent; border:1px solid var(--border);
  border-radius:6px; color:var(--muted); font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:1px; cursor:pointer; transition:all 0.15s; flex-shrink:0;
}
.hbtn:active { background:var(--border); }
.hbtn.accent { border-color:var(--accent); color:var(--accent); margin-left:auto; }
.hbtn.on { background:var(--accent2); border-color:var(--accent2); color:var(--bg); }
.hbtn.chain-active { background:var(--chain); border-color:var(--chain); color:var(--bg); }

/* FILTER BAR */
#filterBar {
  flex-shrink:0; display:flex; gap:5px; padding:7px 14px;
  overflow-x:auto; scrollbar-width:none; background:var(--bg2); border-bottom:1px solid var(--border);
}
#filterBar::-webkit-scrollbar { display:none; }
.fbtn {
  flex-shrink:0; padding:4px 10px; border-radius:20px; border:1px solid var(--border);
  background:transparent; color:var(--muted); font-family:'JetBrains Mono',monospace;
  font-size:10px; cursor:pointer; transition:all 0.15s; white-space:nowrap;
}
.fbtn.on { border-color:var(--accent); color:var(--accent); background:rgba(0,212,170,0.08); }

/* MAIN AREA */
#main { flex:1; display:flex; flex-direction:column; min-height:0; position:relative; }

/* MAP MODE */
#mapWrap { flex:1; min-height:0; position:relative; display:flex; flex-direction:column; }
#map { flex:1; min-height:0; }
.leaflet-container { background:#06111e !important; }
.leaflet-tile { filter:brightness(0.65) saturate(0.5); }
.leaflet-control-zoom a { background:var(--panel) !important; color:var(--accent) !important; border-color:var(--border) !important; }

/* TEXT MODE */
#textMode {
  display:none; flex:1; overflow-y:auto; padding:12px 14px;
  background:var(--bg);
}
#textMode.show { display:block; }

.tcard {
  background:var(--panel); border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; margin-bottom:7px; display:flex; align-items:center; gap:10px;
  cursor:pointer; transition:border-color 0.15s; animation:fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.tcard.inchain { border-color:var(--chain); background:rgba(255,215,0,0.05); }
.tcard-no { font-family:'Teko',sans-serif; font-size:22px; color:#fff; line-height:1; width:52px; flex-shrink:0; }
.tcard.inchain .tcard-no { color:var(--chain); }
.tcard-info { flex:1; min-width:0; }
.tcard-title { font-size:11px; color:var(--text); line-height:1.4; }
.tcard-meta { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); margin-top:3px; }
.tcard-scale { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--accent3); flex-shrink:0; text-align:right; }

.tsearch {
  position:sticky; top:0; background:var(--bg); padding-bottom:10px; z-index:5;
}
.tsearch input {
  width:100%; background:var(--panel); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:12px; padding:8px 12px; outline:none;
}
.tsearch input::placeholder { color:var(--muted); }

/* BOTTOM SHEET */
#sheet {
  flex-shrink:0; background:var(--panel);
  border-top:2px solid var(--border);
  display:flex; flex-direction:column;
  transition:height 0.3s ease;
  height:44px;
}
#sheet.expanded { height:40vh; }

#sheetHandle {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 14px; height:44px; cursor:pointer; flex-shrink:0;
  border-bottom:1px solid var(--border); user-select:none;
}
.sht-title { font-family:'Teko',sans-serif; font-size:17px; letter-spacing:2px; }
.sht-right { display:flex; align-items:center; gap:10px; }
.sht-count { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--chain); }
.sht-arrow { color:var(--muted); font-size:14px; transition:transform 0.3s; }
#sheet:not(.expanded) .sht-arrow { transform:rotate(180deg); }

#sheetTabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
.stab {
  flex:1; padding:8px; text-align:center; font-family:'JetBrains Mono',monospace;
  font-size:10px; letter-spacing:1px; color:var(--muted); cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.15s;
}
.stab.on { color:var(--accent2); border-bottom-color:var(--accent2); }

#sheetBody { flex:1; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; }

/* CHAIN LIST */
.ci {
  display:flex; align-items:center; gap:8px;
  padding:10px 14px; border-bottom:1px solid var(--border);
}
.cnum { font-family:'Teko',sans-serif; font-size:20px; color:var(--chain); width:22px; text-align:center; flex-shrink:0; }
.cinfo { flex:1; min-width:0; }
.cid { font-family:'JetBrains Mono',monospace; font-size:12px; color:#fff; font-weight:600; }
.clayer { font-size:9px; color:var(--muted); margin-left:4px; }
.ctitle { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.cscale { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--accent3); flex-shrink:0; }
.cacts { display:flex; gap:3px; flex-shrink:0; }
.cact {
  width:28px; height:28px; background:transparent; border:1px solid var(--border);
  border-radius:5px; color:var(--muted); font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.cact:active { background:var(--border); color:#fff; }

/* EXPORT */
#expWrap { padding:14px; }
#exportText {
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-family:'JetBrains Mono',monospace; font-size:10px;
  padding:10px; resize:none; height:120px; outline:none; line-height:1.6;
}
.expbtns { display:flex; gap:8px; margin-top:8px; }
.expbtn {
  flex:1; padding:10px; border-radius:7px; border:none;
  font-family:'Teko',sans-serif; font-size:16px; letter-spacing:2px; cursor:pointer;
}
.eprimary { background:var(--accent); color:var(--bg); }
.esecondary { background:var(--border); color:var(--text); }

.empty { text-align:center; padding:28px 20px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); line-height:1.9; }

/* Leaflet tooltip */
.leaflet-tooltip {
  background:var(--panel) !important; border:1px solid var(--accent) !important;
  color:var(--text) !important; font-family:'JetBrains Mono',monospace !important;
  font-size:10px !important; border-radius:5px !important; padding:5px 9px !important;
  box-shadow:none !important;
}
.leaflet-tooltip::before { display:none !important; }

/* LOADING */
#loadOver {
  display:none; position:fixed; inset:0; background:rgba(6,17,30,0.93);
  z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:12px;
}
#loadOver.show { display:flex; }
.spin { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:sp 0.7s linear infinite; }
@keyframes sp { to{transform:rotate(360deg)} }
#loadTxt { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent); }

  /* WAYPOINT PANEL */
  #wpPanel { display:none; position:fixed; inset:0; z-index:2000; background:rgba(6,17,30,0.97); flex-direction:column; }
  #wpPanel.show { display:flex; }
  #wpHeader { display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
  #wpHeader .wptitle { font-family:'Teko',sans-serif; font-size:20px; letter-spacing:2px; flex:1; }
  #wpClose { padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:11px; cursor:pointer; }
  #wpBody { flex:1; overflow-y:auto; padding:14px; }
  .wp-section { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
  #wpAddForm { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:12px; }
  .wp-row { display:flex; gap:8px; margin-bottom:8px; }
  .wp-inp { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:11px; padding:7px 10px; outline:none; min-width:0; }
  .wp-inp::placeholder { color:var(--muted); }
  .wp-inp:focus { border-color:var(--accent); }
  .wp-addrow { display:flex; gap:6px; }
  .wp-addbtn { flex:1; padding:9px; background:var(--accent); border:none; border-radius:7px; color:var(--bg); font-family:'Teko',sans-serif; font-size:15px; letter-spacing:2px; cursor:pointer; }
  .wp-pastebtn { flex:1; padding:9px; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--muted); font-family:'Teko',sans-serif; font-size:15px; letter-spacing:2px; cursor:pointer; }
  #wpPasteArea { display:none; margin-top:8px; }
  #wpPasteArea textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:10px; padding:10px; resize:none; height:90px; outline:none; line-height:1.6; }
  .wp-parsebtn { width:100%; margin-top:6px; padding:9px; background:var(--accent2); border:none; border-radius:7px; color:var(--bg); font-family:'Teko',sans-serif; font-size:15px; letter-spacing:2px; cursor:pointer; }
  #wpParseErr { color:#ff6666; font-family:'JetBrains Mono',monospace; font-size:10px; margin-top:6px; display:none; }
  #wpListTitle { margin-top:4px; }
  .wp-item { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--panel); border:1px solid var(--border); border-radius:7px; margin-bottom:6px; }
  .wp-num { font-family:'Teko',sans-serif; font-size:18px; color:var(--accent); width:20px; flex-shrink:0; }
  .wp-info { flex:1; min-width:0; }
  .wp-name { font-family:'JetBrains Mono',monospace; font-size:11px; color:#fff; font-weight:600; }
  .wp-coord { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); margin-top:2px; }
  .wp-del { width:26px; height:26px; background:transparent; border:1px solid var(--border); border-radius:5px; color:var(--muted); cursor:pointer; font-size:12px; }
  .wp-del:active { color:#ff4444; border-color:#ff4444; }
  #wpDrawBtn { width:100%; padding:10px; background:var(--accent); border:none; border-radius:7px; color:var(--bg); font-family:'Teko',sans-serif; font-size:16px; letter-spacing:2px; cursor:pointer; margin-top:4px; display:none; }
  #wpClearBtn { width:100%; padding:10px; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--muted); font-family:'Teko',sans-serif; font-size:16px; letter-spacing:2px; cursor:pointer; margin-top:6px; display:none; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <button class="hbtn" onclick="try{window.parent.switchModule('home')}catch(e){history.back()}" title="NavHub" style="border-color:#ff8c42;color:#ff8c42;padding:5px 9px;font-size:13px;">⊞</button>
    <div class="logo">VCP<span>·</span>PLI</div>
    <span class="sub">VOYAGE CHART PLANNER</span>
    <button class="hbtn" id="modeBtn" onclick="toggleMode()">🗺 MAP</button>
    <button class="hbtn" id="wpBtn" onclick="toggleWpPanel()" title="Waypoints">📍</button>
    <button class="hbtn" id="chainModeBtn" onclick="toggleChainMode()" title="Chain Mode">⛓</button>
    <button class="hbtn accent" onclick="document.getElementById('fileIn').click()">📂</button>
    <input type="file" id="fileIn" accept=".json" style="display:none" onchange="loadFile(event)">
  </div>

  <!-- FILTER -->
  <div id="filterBar">
    <button class="fbtn on" data-layer="ALL" onclick="setFilter('ALL',this)">ALL</button>
    <button class="fbtn" data-layer="GENERAL" onclick="setFilter('GENERAL',this)">🌐 GENERAL</button>
    <button class="fbtn" data-layer="OVERVIEW" onclick="setFilter('OVERVIEW',this)">🗺 OVERVIEW</button>
    <button class="fbtn" data-layer="COASTAL" onclick="setFilter('COASTAL',this)">🏖 COASTAL</button>
    <button class="fbtn" data-layer="APPROACH" onclick="setFilter('APPROACH',this)">🧭 APPROACH</button>
    <button class="fbtn" data-layer="HARBOUR" onclick="setFilter('HARBOUR',this)">🏗 HARBOUR</button>
    <button class="fbtn" data-layer="BERTHING" onclick="setFilter('BERTHING',this)">⚓ BERTHING</button>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- MAP MODE -->
    <div id="mapWrap">
      <div id="map"></div>
    </div>

    <!-- TEXT MODE -->
    <div id="textMode">
      <div class="tsearch">
        <input type="search" id="textSearch" placeholder="🔍  Cari nomor peta atau nama..." oninput="renderTextList()">
      </div>
      <div id="textList"></div>
    </div>

  </div>

  <!-- BOTTOM SHEET -->
  <div id="sheet">
    <div id="sheetHandle" onclick="toggleSheet()">
      <span class="sht-title">ROUTE CHAIN</span>
      <div class="sht-right">
        <span class="sht-count" id="chainCount">0 peta</span>
        <span class="sht-arrow">▲</span>
      </div>
    </div>
    <div id="sheetTabs">
      <div class="stab on" onclick="showTab('chain',this)">CHAIN</div>
      <div class="stab" onclick="showTab('export',this)">EXPORT</div>
    </div>
    <div id="sheetBody">
      <div id="chainTab">
        <div class="empty" id="chainEmpty">Belum ada peta dipilih.<br>Tap kotak di map atau tap kartu di Text Mode.</div>
        <div id="chainList"></div>
      </div>
      <div id="exportTab" style="display:none">
        <div id="expWrap">
          <textarea id="exportText" readonly placeholder="Chain akan tampil di sini..."></textarea>
          <div class="expbtns">
            <button class="expbtn eprimary" onclick="copyExport()">COPY TEKS</button>
            <button class="expbtn esecondary" onclick="clearChain()">CLEAR</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="wpPanel">
  <div id="wpHeader">
    <span class="wptitle">📍 WAYPOINTS</span>
    <button id="wpClose" onclick="toggleWpPanel()">✕ TUTUP</button>
  </div>
  <div id="wpBody">
    <div class="wp-section">Tambah Waypoint</div>
    <div id="wpAddForm">
      <div class="wp-row">
        <input class="wp-inp" id="wpName" placeholder="Nama (mis: SANGATTA)">
      </div>
      <div class="wp-row">
        <input class="wp-inp" id="wpLat" placeholder="00° 58.800' N">
        <input class="wp-inp" id="wpLon" placeholder="117° 34.800' E">
      </div>
      <div class="wp-addrow">
        <button class="wp-addbtn" onclick="addWpManual()">+ TAMBAH</button>
        <button class="wp-pastebtn" onclick="togglePaste()">PASTE</button>
      </div>
      <div id="wpPasteArea">
        <textarea id="wpPasteText" placeholder="SANGATTA    00° 58.800' N    117° 34.800' E&#10;SAMARINDA   00° 30.000' S    117° 09.000' E"></textarea>
        <button class="wp-parsebtn" onclick="parsePaste()">PARSE & TAMBAH</button>
        <div id="wpParseErr"></div>
      </div>
    </div>
    <div class="wp-section" id="wpListTitle" style="display:none">Daftar Waypoint</div>
    <div id="wpList"></div>
    <button id="wpDrawBtn" onclick="drawRoute();toggleWpPanel();">🗺 TAMPILKAN DI MAP</button>
    <button id="wpClearBtn" onclick="clearWaypoints()">HAPUS SEMUA</button>
  </div>
</div>

<div id="loadOver">
  <div class="spin"></div>
  <div id="loadTxt">Memuat...</div>
</div>

<script>
// ===== STATE =====
const LAYER_COLORS = {
  GENERAL:  { stroke:'#4a9eff', fill:'rgba(74,158,255,0.12)' },
  OVERVIEW: { stroke:'#00d4aa', fill:'rgba(0,212,170,0.12)' },
  COASTAL:  { stroke:'#ff8c42', fill:'rgba(255,140,66,0.12)' },
  APPROACH: { stroke:'#a78bfa', fill:'rgba(167,139,250,0.12)' },
  HARBOUR:  { stroke:'#ffd700', fill:'rgba(255,215,0,0.12)' },
  BERTHING: { stroke:'#ff6b6b', fill:'rgba(255,107,107,0.12)' },
};
const CHAIN_STYLE = { color:'#ffd700', fillColor:'rgba(255,215,0,0.22)', fillOpacity:1, weight:2.5 };

let charts = [];
let chain = [];
let activeFilters = new Set(['ALL']); // multi-select
let mapMode = true;
let sheetCollapsed = true;
let activeTab = 'chain';
let rects = [];
let chainMode = false;       // minesweeper mode
let intersectVisible = null; // Set of UIDs visible in chainMode

// ===== WAYPOINTS =====
let waypoints = [];
let routeLayer = null;
let wpMarkers = [];

function parseDDM(s) {
  s = s.trim().toUpperCase();
  var re = /(\d+)\s*[°d]\s*(\d+\.?\d*)\s*['\`m]?\s*([NSEW])/;
  var m = s.match(re);
  if (!m) return null;
  var dd = parseInt(m[1]) + parseFloat(m[2]) / 60;
  if (m[3] === 'S' || m[3] === 'W') dd = -dd;
  return dd;
}

function ddToDDM(dd, dirs) {
  var dir = dd >= 0 ? dirs[0] : dirs[1];
  var abs = Math.abs(dd);
  var deg = Math.floor(abs);
  var min = ((abs - deg) * 60).toFixed(3);
  return ('0'+deg).slice(-2) + '\u00b0 ' + ('0'+min).slice(-6) + '\' ' + dir;
}

function addWpManual() {
  var name = document.getElementById('wpName').value.trim() || ('WP'+(waypoints.length+1));
  var lat = parseDDM(document.getElementById('wpLat').value);
  var lon = parseDDM(document.getElementById('wpLon').value);
  if (lat === null || lon === null) { alert("Format tidak valid.\nContoh: 00\u00b0 58.800' N"); return; }
  waypoints.push({name:name, lat:lat, lon:lon});
  document.getElementById('wpName').value = '';
  document.getElementById('wpLat').value = '';
  document.getElementById('wpLon').value = '';
  renderWpList();
}

function togglePaste() {
  var a = document.getElementById('wpPasteArea');
  a.style.display = a.style.display === 'none' ? 'block' : 'none';
}

function parsePaste() {
  var txt = document.getElementById('wpPasteText').value;
  var errEl = document.getElementById('wpParseErr');
  var rows = txt.split('\n');
  var errors = [];
  rows.forEach(function(line, idx) {
    line = line.trim();
    if (!line) return;
    var parts = line.split(/\s{2,}|\t/).map(function(t){return t.trim();}).filter(function(t){return t;});
    var wname, lstr, lostr;
    if (parts.length >= 3) { wname=parts[0]; lstr=parts[1]; lostr=parts[2]; }
    else if (parts.length === 2) { wname='WP'+(waypoints.length+1); lstr=parts[0]; lostr=parts[1]; }
    else { errors.push('Baris '+(idx+1)+': format tidak dikenali'); return; }
    var lt = parseDDM(lstr);
    var lo = parseDDM(lostr);
    if (lt===null||lo===null) { errors.push('Baris '+(idx+1)+': koordinat tidak valid'); return; }
    waypoints.push({name:wname, lat:lt, lon:lo});
  });
  if (errors.length) { errEl.style.display='block'; errEl.textContent=errors.join(' | '); }
  else { errEl.style.display='none'; document.getElementById('wpPasteText').value=''; document.getElementById('wpPasteArea').style.display='none'; }
  renderWpList();
}

function removeWp(i) { waypoints.splice(i,1); renderWpList(); }

function renderWpList() {
  var list = document.getElementById('wpList');
  var title = document.getElementById('wpListTitle');
  var drawBtn = document.getElementById('wpDrawBtn');
  var clearBtn = document.getElementById('wpClearBtn');
  if (!waypoints.length) {
    list.innerHTML=''; title.style.display='none'; drawBtn.style.display='none'; clearBtn.style.display='none'; return;
  }
  title.style.display='block'; drawBtn.style.display='block'; clearBtn.style.display='block';
  list.innerHTML = waypoints.map(function(wp,i){
    return '<div class="wp-item">'
      +'<div class="wp-num">'+(i+1)+'</div>'
      +'<div class="wp-info"><div class="wp-name">'+wp.name+'</div>'

function parseDDM(s) {
  s = s.trim().toUpperCase();
  var m = s.match(/(\d+)[°\s]+(\d+\.?\d*)['´\s]*([NSEW])/);
  if (!m) return null;
  var dd = parseInt(m[1]) + parseFloat(m[2]) / 60;
  if (m[3] === 'S' || m[3] === 'W') dd = -dd;
  return dd;
}

function ddToDDM(dd, dirs) {
  var dir = dd >= 0 ? dirs[0] : dirs[1];
  var abs = Math.abs(dd);
  var deg = Math.floor(abs);
  var mins = ((abs - deg) * 60).toFixed(3);
  return (deg < 10 ? '0' : '') + deg + '\u00b0 ' + mins + "' " + dir;
}

// ===== LOAD FILE =====
function loadFile(e) {
  const file = e.target.files[0]; if(!file) return;
  showLoad('Membaca file...');
  const r = new FileReader();
  r.onload = ev => {
    try { parseData(JSON.parse(ev.target.result)); }
    catch(err) { hideLoad(); alert('Gagal: '+err.message); }
  };
  r.readAsText(file);
  e.target.value = '';
}

function parseData(json) {
  showLoad('Memproses geometri...');
  const layers = json.layers || json;
  charts = [];

  for (const [layerName, records] of Object.entries(layers)) {
    for (const rec of records) {
      const attr = rec.attributes || rec;
      const geo = rec.geometry;
      if (!geo?.paths?.[0]) continue;
      const pts = geo.paths[0];
      const lons = pts.map(p=>p[0]), lats = pts.map(p=>p[1]);
      charts.push({
        uid: layerName+'_'+attr.OBJECTID,
        layer: layerName.toUpperCase(),
        attr,
        bbox: {
          minLon:Math.min(...lons), maxLon:Math.max(...lons),
          minLat:Math.min(...lats), maxLat:Math.max(...lats),
        },
        rect: null,
      });
    }
  }

  setTimeout(() => {
    renderMap();
    renderTextList();
    hideLoad();
    if (charts.length) fitVisible();
  }, 30);
}

// ===== MAP RENDER =====
function isVisible(c) {
  const layerOk = activeFilters.has('ALL') || activeFilters.has(c.layer);
  if (!layerOk) return false;
  if (intersectVisible !== null) return intersectVisible.has(c.uid);
  return true;
}

function renderMap() {
  rects.forEach(r => map.removeLayer(r));
  rects = [];

  // Sort: skala besar (angka besar = overview) render duluan,
  // peta detail (angka kecil) render belakangan = tampil di atas
  const sorted = charts
    .filter(isVisible)
    .sort((a, b) => Number(b.attr.SCALE||0) - Number(a.attr.SCALE||0));

  sorted.forEach(c => {
    const inChain = chain.includes(c.uid);
    const col = LAYER_COLORS[c.layer] || { stroke:'#fff', fill:'rgba(255,255,255,0.1)' };

    const rect = L.rectangle(
      [[c.bbox.minLat, c.bbox.minLon],[c.bbox.maxLat, c.bbox.maxLon]],
      inChain ? {
        color: '#ffd700', weight: 2.5, dashArray: null,
        fillColor: '#ffd700', fillOpacity: 0.18,
      } : {
        color: col.stroke, weight: 1.5, dashArray: '5,4',
        fillColor: col.stroke, fillOpacity: 0.08,
      }
    );

    rect.bindTooltip(
      `<b>${c.attr.CHART_ID}</b> · ${c.layer}<br>${(c.attr.TITLE||'').substring(0,36)}<br><span style="color:#4a9eff">1:${Number(c.attr.SCALE||0).toLocaleString('id')}</span>`,
      { sticky:true }
    );

    rect.on('click', () => toggleChain(c.uid));
    rect.addTo(map);
    c.rect = rect;
    rects.push(rect);
  });

  // Chain selalu di atas + label
  // Hapus label lama
  if (window._chainLabels) window._chainLabels.forEach(l=>map.removeLayer(l));
  window._chainLabels = [];

  chain.forEach(uid => {
    const c = charts.find(ch => ch.uid === uid);
    if (!c?.rect) return;
    c.rect.bringToFront();
    // Tambah label di tengah bbox
    const clat = (c.bbox.minLat + c.bbox.maxLat) / 2;
    const clon = (c.bbox.minLon + c.bbox.maxLon) / 2;
    const label = L.marker([clat, clon], {
      icon: L.divIcon({
        className: '',
        html: `<div style="
          background:rgba(10,22,40,0.75);
          border:1px solid #ffd700;
          color:#ffd700;
          font-family:'JetBrains Mono',monospace;
          font-size:10px;
          font-weight:600;
          padding:2px 5px;
          border-radius:3px;
          white-space:nowrap;
          pointer-events:none;
          transform:translate(-50%,-50%);
        ">${c.attr.CHART_ID}</div>`,
        iconSize: [0,0],
        iconAnchor: [0,0],
      }),
      interactive: false,
      zIndexOffset: 1000,
    });
    label.addTo(map);
    window._chainLabels.push(label);
  });
}

function fitVisible() {
  // Kalau ada chain, fit ke chain; kalau tidak fit semua visible
  const target = chain.length > 0
    ? charts.filter(c=>chain.includes(c.uid))
    : (activeFilters.has('ALL') ? charts : charts.filter(c=>activeFilters.has(c.layer)));
  if (!target.length) return;
  let minLat=90, maxLat=-90, minLon=180, maxLon=-180;
  target.forEach(c => {
    minLat=Math.min(minLat,c.bbox.minLat); maxLat=Math.max(maxLat,c.bbox.maxLat);
    minLon=Math.min(minLon,c.bbox.minLon); maxLon=Math.max(maxLon,c.bbox.maxLon);
  });
  map.fitBounds([[minLat,minLon],[maxLat,maxLon]], {padding:[20,20]});
}

function renderTextList() {
  const q = (document.getElementById('textSearch').value||'').toLowerCase();
  const visible = activeFilters.has('ALL') ? charts : charts.filter(c=>activeFilters.has(c.layer));
  const filtered = q ? visible.filter(c =>

    return `<div class="tcard ${inChain?'inchain':''}" onclick="toggleChain('${c.uid}')">
      <div class="tcard-no">${c.attr.CHART_ID||'—'}</div>

      </div>

// ===== CHAIN =====
function bboxIntersects(a, b) {
  return !(a.maxLon < b.minLon || a.minLon > b.maxLon ||
           a.maxLat < b.minLat || a.minLat > b.maxLat);
}

function toggleChain(uid) {
  if (chainMode) {
    chainModeAdd(uid);
    return;
  }
  const i = chain.indexOf(uid);
  if (i === -1) chain.push(uid);
  else chain.splice(i, 1);
  updateRectStyle(uid);
  renderChainList();
  renderTextList();
  if (sheetCollapsed && chain.length > 0) toggleSheet();
}

function chainModeAdd(uid) {
  // Kalau sudah di chain, undo — pop semua sampai uid ini
  const i = chain.indexOf(uid);
  if (i !== -1) {
    // Remove dari sini ke atas
    const removed = chain.splice(i);
    removed.forEach(u => updateRectStyle(u));
    // Rebuild intersectVisible dari chain yang tersisa
    rebuildIntersect();
    renderMap();
    renderChainList();
    renderTextList();
    return;
  }

  // Tambah ke chain
  chain.push(uid);
  updateRectStyle(uid);

  // Hitung intersect dari peta ini
  const c = charts.find(ch=>ch.uid===uid);
  if (c) {
    // Visible = semua yang beririsan dengan c, termasuk yang sudah di chain
    const newVisible = new Set();
    charts.forEach(other => {
      if (bboxIntersects(c.bbox, other.bbox)) newVisible.add(other.uid);
    });
    // Selalu tampilkan yang sudah di chain
    chain.forEach(u => newVisible.add(u));
    intersectVisible = newVisible;
  }

  renderMap();
  renderChainList();
  renderTextList();
  if (sheetCollapsed) toggleSheet();
}

function rebuildIntersect() {
  if (chain.length === 0) {
    intersectVisible = null;
    return;
  }
  // Intersect dari peta terakhir di chain
  const lastUid = chain[chain.length - 1];
  const c = charts.find(ch=>ch.uid===lastUid);
  if (!c) { intersectVisible = null; return; }
  const newVisible = new Set();
  charts.forEach(other => {
    if (bboxIntersects(c.bbox, other.bbox)) newVisible.add(other.uid);
  });
  chain.forEach(u => newVisible.add(u));
  intersectVisible = newVisible;
}

function updateRectStyle(uid) {
  const c = charts.find(ch=>ch.uid===uid);
  if (!c?.rect) return;
  const inChain = chain.includes(uid);
  const col = LAYER_COLORS[c.layer] || { stroke:'#fff' };
  if (inChain) {
    c.rect.setStyle({ color:'#ffd700', weight:2.5, dashArray:null, fillColor:'#ffd700', fillOpacity:0.18 });
    c.rect.bringToFront();
  } else {
    c.rect.setStyle({ color:col.stroke, weight:1.5, dashArray:'5,4', fillColor:col.stroke, fillOpacity:0.08 });
  }
}

function toggleChainMode() {
  chainMode = !chainMode;
  const btn = document.getElementById('chainModeBtn');
  btn.classList.toggle('chain-active', chainMode);
  btn.title = chainMode ? 'Chain Mode ON (tap untuk off)' : 'Chain Mode';
  if (chainMode && chain.length > 0) {
    // Langsung rebuild intersect dari peta terakhir di chain
    rebuildIntersect();
  } else {
    // Off atau chain kosong — tampilkan semua
    intersectVisible = null;
  }
  renderMap();
}

function moveChain(uid, dir) {
  const i = chain.indexOf(uid); if(i<0) return;
  const ni = i+dir; if(ni<0||ni>=chain.length) return;
  [chain[i],chain[ni]] = [chain[ni],chain[i]];
  renderChainList();
}

function removeFromChain(uid) {
  chain = chain.filter(u=>u!==uid);
  const c = charts.find(ch=>ch.uid===uid);
  if (c?.rect) {
    const col = LAYER_COLORS[c.layer] || { stroke:'#fff' };
    c.rect.setStyle({ color:col.stroke, weight:1.5, dashArray:'5,4', fillColor:col.stroke, fillOpacity:0.08 });
  }
  renderChainList();
  renderTextList();
}

function clearChain() {
  chain.forEach(uid => {
    const c = charts.find(ch=>ch.uid===uid);
    if (c?.rect) {
      const col = LAYER_COLORS[c.layer] || { stroke:'#fff' };
      c.rect.setStyle({ color:col.stroke, weight:1.5, dashArray:'5,4', fillColor:col.stroke, fillOpacity:0.08 });
    }
  });
  chain = [];
  intersectVisible = null;
  if (window._chainLabels) { window._chainLabels.forEach(l=>map.removeLayer(l)); window._chainLabels=[]; }
  renderChainList();
  renderTextList();
  renderMap();
  document.getElementById('exportText').value = '';
}

function renderChainList() {
  const list = document.getElementById('chainList');
  const empty = document.getElementById('chainEmpty');
  document.getElementById('chainCount').textContent = chain.length + ' peta';

  if (chain.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    if (activeTab === 'export') document.getElementById('exportText').value = '';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = chain.map((uid, i) => {
    const c = charts.find(ch=>ch.uid===uid); if(!c) return '';
    const a = c.attr;
    return `<div class="ci">
      <div class="cnum">${i+1}</div>
      <div class="cinfo">
        <div class="cid">${a.CHART_ID}<span class="clayer">${c.layer}</span></div>
        <div class="ctitle">${a.TITLE||''}</div>
      </div>
      <div class="cscale">1:${Number(a.SCALE||0).toLocaleString('id')}</div>
      <div class="cacts">
        <button class="cact" onclick="moveChain('${uid}',-1)">↑</button>
        <button class="cact" onclick="moveChain('${uid}',1)">↓</button>
        <button class="cact" onclick="removeFromChain('${uid}')">✕</button>
      </div>
    </div>`;
  }).join('');

  if (activeTab === 'export') updateExport();
}

// ===== EXPORT =====
function updateExport() {
  if (!chain.length) { document.getElementById('exportText').value=''; return; }
  const lines = [
    'VOYAGE CHART CHAIN',
    'Generated: '+new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),
    '━'.repeat(38), '',
  ];
  chain.forEach((uid,i) => {
    const c = charts.find(ch=>ch.uid===uid); if(!c) return;
    const a = c.attr;
    lines.push(`${String(i+1).padStart(2,'0')}. [${a.CHART_ID}] ${a.TITLE||''}`);
    lines.push(`    Scale  : 1:${Number(a.SCALE||0).toLocaleString('id')} | ${c.layer}`);
    lines.push(`    Edition: ${a.EDITION||'-'}`);
    lines.push(`    NM s/d : ${a.NM_PRINTED||'-'}`);
    if (i < chain.length-1) lines.push('    ↓');
  });
  lines.push('', '━'.repeat(38), `Total: ${chain.length} peta`);
  document.getElementById('exportText').value = lines.join('\n');
}

function copyExport() {
  updateExport();
  const txt = document.getElementById('exportText').value;
  if (!txt) return;
  navigator.clipboard.writeText(txt).then(() => {
    const b = event.target; b.textContent = '✓ TERSALIN!';
    setTimeout(() => b.textContent = 'COPY TEKS', 2000);
  }).catch(() => {
    document.getElementById('exportText').select();
    document.execCommand('copy');
  });
}

// ===== UI CONTROLS =====
function toggleMode() {
  mapMode = !mapMode;
  const btn = document.getElementById('modeBtn');
  const mapWrap = document.getElementById('mapWrap');
  const textMode = document.getElementById('textMode');
  if (mapMode) {
    btn.textContent = '🗺 MAP'; btn.classList.remove('on');
    mapWrap.style.display = 'flex';
    textMode.classList.remove('show');
    setTimeout(() => map.invalidateSize(), 50);
  } else {
    btn.textContent = '📋 TEXT'; btn.classList.add('on');
    mapWrap.style.display = 'none';
    textMode.classList.add('show');
    renderTextList();
  }
}

function setFilter(layer, btn) {
  if (layer === 'ALL') {
    activeFilters = new Set(['ALL']);
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  } else {
    activeFilters.delete('ALL');
    document.querySelector('.fbtn[data-layer="ALL"]').classList.remove('on');
    if (activeFilters.has(layer)) {
      activeFilters.delete(layer);
      btn.classList.remove('on');
      if (activeFilters.size === 0) {
        activeFilters.add('ALL');
        document.querySelector('.fbtn[data-layer="ALL"]').classList.add('on');
      }
    } else {
      activeFilters.add(layer);
      btn.classList.add('on');
    }
  }
  renderMap();
  renderTextList();
}

function toggleSheet() {
  sheetCollapsed = !sheetCollapsed;
  document.getElementById("sheet").classList.toggle("expanded", !sheetCollapsed);
  setTimeout(()=>map.invalidateSize(), 310);
}

function showTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('chainTab').style.display = tab==='chain' ? 'block' : 'none';
  document.getElementById('exportTab').style.display = tab==='export' ? 'block' : 'none';
  if (tab === 'export') updateExport();
}

function showLoad(msg) {
  document.getElementById('loadOver').classList.add('show');
  document.getElementById('loadTxt').textContent = msg;
}
function hideLoad() { document.getElementById('loadOver').classList.remove('show'); }
</script>
</body>
